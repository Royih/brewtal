<div (click)="toggleOutput(output)" *ngFor="let output of manualOutputs">
  <span class="align-middle">{{output.name}}:</span>
  <i [class]="'align-middle fa fa-3x '+(output.value ? 'fa-toggle-on' : 'fa-toggle-off')+(output.pending ? ' fa-disabled': '')"></i>
</div>
