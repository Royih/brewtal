<mat-form-field [ngClass]="{'no-padding': noPadding}">
  <mat-select [placeholder]="placeholder" [required]="required" [formControl]="formControl" (openedChange)="loadOptions($event)" [compareWith]="isSelected" multiple>
    <mat-option *ngFor="let opt of options" [value]="opt">
      {{opt[labelField]}}
    </mat-option>
  </mat-select>
  <mat-error *ngIf="formControl.invalid">{{getErrorMessage()}}</mat-error>
</mat-form-field>
