<div class="card mt-4">
  <div class="card-header">
    {{name}}
  </div>
  <div class="card-body">
    <div class="input-group mb-3">
      <div class="input-group-prepend">
        <span class="input-group-text" id="basic-addon3">Actual temp</span>
      </div>
      <button class="btn btn-primary">
        {{pidStat?.currentTemp | number: '1.2-2'}}
      </button>
      <div class="input-group-append">
        <span class="input-group-text" id="basic-addon2">ºC</span>
      </div>
    </div>

    <div class="input-group mb-3">
      <div class="input-group-prepend">
        <span class="input-group-text" id="basic-addon3">Target temp</span>
        <span class="input-group-text text-primary">
          <span *ngIf="!targetTempChanging && targetTemp==pidStat?.targetTemp">{{pidStat?.targetTemp | number: '1.2-2'}}</span>
          <i class="fa fa fa-cog fa-spin fa-fw" *ngIf="!(!targetTempChanging && targetTemp==pidStat?.targetTemp)"></i>
        </span>
        
        <div class="input-group-append">
          <span class="input-group-text" id="basic-addon2">ºC</span>
        </div>
      </div>
    </div>

    <div class="input-group mb-3">
      <div class="btn-group">
        <button class="btn btn-outline-primary" type="button" (click)="updateTargetTemp(-5)">
          <i class="fa fa-fast-backward"></i>
        </button>
        <button class="btn btn-outline-primary" type="button" (click)="updateTargetTemp(-1)">
          <i class="fa fa-step-backward"></i>
        </button>
        <button class="btn btn-outline-primary" type="button" (click)="updateTargetTemp(-.1)">
          <i class="fa fa-backward"></i>
        </button>
        <span class="input-group-text" id="basic-addon2" style="width: 75px">          
          <span>{{targetTemp | number: '1.2-2'}}ºC </span>

        </span>
        <button class="btn btn-outline-primary" type="button" (click)="updateTargetTemp(.1)">
          <i class="fa fa-forward"></i>
        </button>
        <button class="btn btn-outline-primary" type="button" (click)="updateTargetTemp(1)">
          <i class="fa fa-step-forward"></i>
        </button>
        <button class="btn btn-outline-primary" type="button" (click)="updateTargetTemp(5)">
          <i class="fa fa-fast-forward"></i>
        </button>
      </div>
    </div>


    <div class="input-group mb-3">
      <div class="input-group-prepend">
        <span class="input-group-text" id="basic-addon3">Ouput pin</span>
      </div>
      <button [class]="'btn ' +((pidStat?.output) ? 'btn-success' : 'btn-danger')">
        {{(pidStat?.output || false) ? 'On' : 'Off' }}
      </button>
    </div>

  </div>
</div>
